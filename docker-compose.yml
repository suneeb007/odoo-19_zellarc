services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zellarc_technologies}
      POSTGRES_USER: ${POSTGRES_USER:-suneeb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suneeb19931996@}
    volumes:
      - ${HOST_PG_DATA:-./pgdata}:/var/lib/postgresql/data
    ports:
      - "${HOST_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5


  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/odoo:19.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_ODOO_PORT:-8069}:8069"
      - "${HOST_LONGPOLLING_PORT:-8072}:8072"
    restart: unless-stopped
    command:
      - odoo
      - --db_host=${DB_HOST:-db}
      - --db_port=${DB_PORT:-5432}
      - --db_user=${DB_USER:-${POSTGRES_USER:-suneeb}}
      - --db_password=${DB_PASSWORD:-${POSTGRES_PASSWORD:-suneeb19931996@}}
      - --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
      - --data-dir=/var/lib/odoo
    environment:
      HOST: ${DB_HOST:-db}
      USER: ${DB_USER:-${POSTGRES_USER:-suneeb}}
      PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-suneeb19931996@}}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-${POSTGRES_USER:-suneeb}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-suneeb19931996@}}
      PGHOST: ${DB_HOST:-db}
      PGPORT: ${DB_PORT:-5432}
      PGUSER: ${DB_USER:-${POSTGRES_USER:-suneeb}}
      PGPASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-suneeb19931996@}}
    volumes:
      - ${HOST_ADDONS:-./addons}:/mnt/extra-addons
      - odoo_data:/var/lib/odoo
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport socket, sys\ns=socket.socket()\ns.settimeout(1)\ntry:\n s.connect(('localhost', 8069))\n s.close()\nexcept Exception:\n sys.exit(1)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 6


volumes:
  odoo_data:
    driver: local
