name: Deploy Odoo to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            cd ~/odoo-deploy || exit 1
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.hostinger.yml pull --ignore-pull-failures
            docker compose -f docker-compose.hostinger.yml down --remove-orphans || true
            docker compose -f docker-compose.hostinger.yml up -d --remove-orphans
