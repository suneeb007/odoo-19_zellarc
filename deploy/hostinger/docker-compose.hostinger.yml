version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  odoo:
    image: suneeb/odoo:latest
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - HOST=db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${HOST_ODOO_PORT}:8069"
    volumes:
      - odoo_filestore:/var/lib/odoo/filestore

volumes:
  db_data:
    driver: local
  odoo_filestore:
    driver: local
