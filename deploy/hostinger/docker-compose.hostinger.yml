services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${HOST_PG_DATA:-./data/postgres}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${HOST_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: suneeb/odoo:latest
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command:
      - odoo
      - --db_host=db
      - --db_port=5432
      - --db_user=${DB_USER:-${POSTGRES_USER}}
      - --db_password=${DB_PASSWORD:-${POSTGRES_PASSWORD}}
      - --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
      - --data-dir=/var/lib/odoo
    environment:
      HOST: db
      USER: ${DB_USER:-${POSTGRES_USER}}
      PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD}}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-${POSTGRES_USER}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD}}
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${DB_USER:-${POSTGRES_USER}}
      PGPASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD}}
    ports:
      - "127.0.0.1:${HOST_ODOO_PORT:-8069}:8069"
      - "127.0.0.1:${HOST_LONGPOLLING_PORT:-8072}:8072"
    volumes:
      - ${HOST_ODOO_DATA:-./data/odoo}:/var/lib/odoo
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport socket, sys\ns=socket.socket()\ns.settimeout(1)\ntry:\n s.connect(('localhost', 8069))\n s.close()\nexcept Exception:\n sys.exit(1)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 6