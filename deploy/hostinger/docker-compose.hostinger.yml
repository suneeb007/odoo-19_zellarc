services:
  db:
    image: postgres:15
    container_name: odoo_db_hostinger
    restart: unless-stopped
    env_file: .env.hostinger
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${HOST_PG_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - odoo-net

  odoo:
    image: docker.io/suneeb/odoo:latest
    container_name: odoo_app_hostinger
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.hostinger
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${HOST_ODOO_PORT:-18069}:8069"
    volumes:
      - odoo_filestore:/var/lib/odoo
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8069 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - odoo-net

volumes:
  odoo_db_data:
  odoo_filestore:

networks:
  odoo-net:
    driver: bridge
